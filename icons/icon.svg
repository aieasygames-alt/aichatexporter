<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="200" height="200" rx="40" fill="black" />

  <!-- 抽象 AI 导航方块 (代表 ChatGPT, Gemini, Claude 等切换) -->
  <rect x="42" y="35" width="36" height="36" rx="10" fill="#10A37F" opacity="0.9" /> <!-- ChatGPT 绿 -->
  <rect x="92" y="45" width="36" height="36" rx="10" fill="#8B5CF6" opacity="0.9" /> <!-- Claude 紫 -->
  <rect x="122" y="85" width="36" height="36" rx="10" fill="#F97316" opacity="0.9" /> <!-- Grok 橙 -->
  <rect x="42" y="95" width="36" height="36" rx="10" fill="#1E88E5" opacity="0.9" /> <!-- Gemini 蓝 -->
  <rect x="72" y="135" width="36" height="36" rx="10" fill="#D97706" opacity="0.9" /> <!-- DeepSeek 深黄 -->

  <!-- 导出箭头 (悬浮在上方，表示从这里导出) -->
  <circle cx="100" cy="100" r="40" fill="white" />
  <path d="M100 70 L100 115 M85 100 L100 115 L115 100" stroke="#1F2937" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Notion 风格的小勾 (象征同步成功) -->
  <path d="M155 150 L165 165 L185 130" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
