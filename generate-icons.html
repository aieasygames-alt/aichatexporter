<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons - AI Chat Exporter</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    .container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .icon-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      margin: 10px 0;
    }
    a {
      display: inline-block;
      background: #3B82F6;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      margin-top: 10px;
    }
    a:hover { background: #2563EB; }
    .instructions {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>🎨 AI Chat Exporter - Icon Generator</h1>

  <div class="instructions">
    <strong>Instructions:</strong> Click each download button to save the icon files to the <code>icons/</code> folder.
  </div>

  <div class="container">
    <div class="icon-box">
      <h3>16×16</h3>
      <canvas id="icon16" width="16" height="16"></canvas><br>
      <a id="download16" download="icon16.png">Download icon16.png</a>
    </div>

    <div class="icon-box">
      <h3>48×48</h3>
      <canvas id="icon48" width="48" height="48"></canvas><br>
      <a id="download48" download="icon48.png">Download icon48.png</a>
    </div>

    <div class="icon-box">
      <h3>128×128</h3>
      <canvas id="icon128" width="128" height="128"></canvas><br>
      <a id="download128" download="icon128.png">Download icon128.png</a>
    </div>
  </div>

  <script>
    // SVG source
    const svgSource = `
      <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景 -->
        <rect width="200" height="200" rx="40" fill="black" />

        <!-- 抽象 AI 导航方块 -->
        <rect x="42" y="35" width="36" height="36" rx="10" fill="#10A37F" opacity="0.9" />
        <rect x="92" y="45" width="36" height="36" rx="10" fill="#8B5CF6" opacity="0.9" />
        <rect x="122" y="85" width="36" height="36" rx="10" fill="#F97316" opacity="0.9" />
        <rect x="42" y="95" width="36" height="36" rx="10" fill="#1E88E5" opacity="0.9" />
        <rect x="72" y="135" width="36" height="36" rx="10" fill="#D97706" opacity="0.9" />

        <!-- 导出箭头 -->
        <circle cx="100" cy="100" r="40" fill="white" />
        <path d="M100 70 L100 115 M85 100 L100 115 L115 100" stroke="#1F2937" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />

        <!-- Notion 风格的小勾 -->
        <path d="M155 150 L165 165 L185 130" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    `;

    function generateIcon(size) {
      const canvas = document.getElementById(`icon${size}`);
      const ctx = canvas.getContext('2d');

      // Create an image from SVG
      const img = new Image();
      const svgBlob = new Blob([svgSource], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function() {
        // Draw the SVG onto canvas
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);

        // Set up download link
        const link = document.getElementById(`download${size}`);
        link.href = canvas.toDataURL('image/png');
      };

      img.src = url;
    }

    // Generate all icons
    [16, 48, 128].forEach(size => generateIcon(size));
  </script>
</body>
</html>
